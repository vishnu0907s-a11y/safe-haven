<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>ResQHer - Your Safety, Our Priority</title>
    <meta name="description" content="ResQHer - Women's safety app with SOS, live tracking, and emergency response" />
    <meta name="author" content="ResQHer" />

    <meta property="og:title" content="ResQHer - Your Safety, Our Priority" />
    <meta property="og:description" content="ResQHer - Women's safety app with SOS, live tracking, and emergency response" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />
  </head>

  <body>
    <div id="root">
      <div style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; background: #0b0d11;">
        <div style="display: flex; flex-direction: column; align-items: center; gap: 20px; animation: fadeIn 0.8s ease-out;">
          <div style="width: 96px; height: 96px; border-radius: 24px; overflow: hidden; display: flex; align-items: center; justify-content: center; box-shadow: 0 25px 50px -12px rgba(139, 92, 246, 0.25);">
            <img src="/logo.png" style="width: 100%; height: 100%; object-fit: contain;" />
          </div>
          <h1 style="color: white; font-family: sans-serif; font-size: 24px; font-weight: 900; letter-spacing: -0.025em; margin: 0;">
            Res<span style="color: #8b5cf6;">Q</span>Her
          </h1>
          <div style="width: 28px; height: 28px; border: 3px solid rgba(255, 255, 255, 0.1); border-top-color: #8b5cf6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        </div>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
      </style>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
